<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze</title>
    <style>
        :root {
            color-scheme: dark;
            --ink: #f5f0df;
            --muted: #b6b09f;
            --panel: #171918;
            --line: #676b60;
            --accent: #efc75e;
        }
        * {
            box-sizing: border-box;
        }
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        body {
            width: 100%;
            height: 100vh;
            height: 100dvh;
            min-height: 0;
            margin: 0;
            padding:
                max(2px, env(safe-area-inset-top))
                max(2px, env(safe-area-inset-right))
                max(2px, env(safe-area-inset-bottom))
                max(2px, env(safe-area-inset-left));
            overflow: hidden;
            overscroll-behavior: none;
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.035) 25%, transparent 25%) 0 0 / 24px 24px,
                linear-gradient(315deg, rgba(255, 255, 255, 0.025) 25%, transparent 25%) 0 0 / 24px 24px,
                #242722;
            color: var(--ink);
            font-family: Georgia, 'Times New Roman', serif;
        }
        #game-wrapper {
            position: relative;
            display: grid;
            width: 100%;
            height: 100%;
            min-width: 0;
            min-height: 0;
            place-items: center;
        }
        main {
            display: grid;
            grid-template:
                "hud" auto
                "stage" minmax(0, 1fr)
                "message" auto
                / minmax(0, 1fr);
            gap: clamp(2px, 0.65vmin, 6px);
            width: min(100%, 1200px);
            height: 100%;
            min-width: 0;
            min-height: 0;
        }
        #hud {
            grid-area: hud;
            position: relative;
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 2px clamp(3px, 1vw, 12px);
            align-items: center;
            width: 100%;
            min-width: 0;
            min-height: 0;
            padding: 3px 50px 3px 6px;
            overflow: hidden;
            border: 1px solid var(--line);
            background: var(--panel);
            font-size: clamp(10px, 2.6vw, 14px);
            font-variant-numeric: tabular-nums;
            line-height: 1.1;
        }
        .hud-stat {
            display: flex;
            min-width: 0;
            align-items: baseline;
            justify-content: center;
            gap: 0.32em;
            white-space: nowrap;
        }
        .stat-label {
            color: var(--muted);
            font-size: 0.78em;
            letter-spacing: 0.035em;
            text-transform: uppercase;
        }
        .stat-value {
            min-width: 0;
            overflow: hidden;
            color: var(--accent);
            font-weight: 700;
            text-overflow: ellipsis;
        }
        #canvas-stage {
            grid-area: stage;
            display: grid;
            width: 100%;
            height: 100%;
            min-width: 0;
            min-height: 0;
            overflow: hidden;
            place-items: center;
            line-height: 0;
            container-type: size;
        }
        #canvas-stage canvas {
            display: block;
            width: min(100cqw, 100cqh) !important;
            height: min(100cqw, 100cqh) !important;
            max-width: 100%;
            max-height: 100%;
            margin: 0 !important;
            aspect-ratio: 1;
            border: 2px solid #d5d0be;
            background: #f4f1e8;
            image-rendering: pixelated;
        }
        #message {
            grid-area: message;
            width: 100%;
            min-width: 0;
            min-height: 1.3em;
            max-height: min(28dvh, 7.5em);
            margin: 0;
            padding: 2px 6px;
            overflow: auto;
            overflow-wrap: anywhere;
            color: #dce8a5;
            font-size: clamp(11px, 2.5vw, 14px);
            font-weight: bold;
            line-height: 1.2;
            scrollbar-width: thin;
            text-align: center;
        }
        .hidden {
            display: none !important;
        }
        #menu-toggle-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border: 1px solid var(--line);
            border-radius: 4px;
            background: var(--panel);
            color: var(--ink);
            font-size: 22px;
            line-height: 1;
            cursor: pointer;
        }
        #menu-toggle-btn:hover {
            background: var(--accent);
            color: var(--panel);
        }
        #menu-toggle-btn:focus-visible {
            outline: 3px solid #fff4b8;
            outline-offset: -3px;
        }
        .overlay-backdrop {
            position: fixed;
            inset: 0;
            z-index: 20;
            background: rgba(15, 17, 14, 0.75);
        }
        .overlay-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            z-index: 30;
            width: min(94vw, 520px);
            max-height: calc(100dvh - 12px);
            padding: clamp(18px, 6vmin, 40px) clamp(18px, 8vmin, 56px);
            overflow: auto;
            transform: translate(-50%, -50%);
            border: 1px solid var(--line);
            background: var(--panel);
            text-align: center;
        }
        .overlay-panel h1 {
            margin-top: 0;
            color: var(--accent);
            font-size: clamp(2rem, 10vmin, 3em);
            letter-spacing: 0.05em;
        }
        .hint {
            margin-bottom: clamp(16px, 5vmin, 28px);
            color: var(--muted);
            font-size: 0.85em;
        }
        .overlay-panel button {
            display: block;
            width: 100%;
            min-height: 44px;
            margin: 10px 0;
            padding: 14px 24px;
            border: 0;
            background: var(--accent);
            color: var(--panel);
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 1.15em;
            font-weight: bold;
            cursor: pointer;
        }
        .overlay-panel button:hover,
        .overlay-panel button:focus-visible {
            background: #d4a83f;
        }
        #overlay-backdrop-pause {
            cursor: pointer;
        }
        @media (max-width: 620px) {
            .hud-stat {
                flex-direction: column;
                align-items: center;
                gap: 0;
            }
        }
        @media (min-aspect-ratio: 4 / 3) {
            main {
                grid-template:
                    "stage hud" minmax(0, 1fr)
                    "stage message" auto
                    / minmax(0, 1fr) clamp(176px, 24vw, 288px);
                width: min(100%, 1280px);
            }
            #hud {
                grid-template-columns: minmax(0, 1fr);
                grid-auto-rows: min-content;
                align-content: start;
                gap: 1px;
                padding: 50px 6px 4px;
                overflow: auto;
                font-size: clamp(10px, 1.6vw, 14px);
                scrollbar-width: thin;
            }
            .hud-stat {
                flex-direction: row;
                justify-content: space-between;
                gap: 8px;
            }
            #message {
                max-height: 35dvh;
                padding-inline: 5px;
            }
        }
    </style>
</head>
<body>
    <div id="overlay-backdrop" class="overlay-backdrop"></div>
    <div
        id="start-panel"
        class="overlay-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="start-title"
    >
        <h1 id="start-title">Maze</h1>
        <p class="hint">Enter the maze now to possibly win a horse.</p>
        <button id="start-btn" type="button">Start Game</button>
    </div>

    <div id="overlay-backdrop-pause" class="overlay-backdrop hidden"></div>
    <div
        id="pause-panel"
        class="overlay-panel hidden"
        role="dialog"
        aria-modal="true"
        aria-labelledby="pause-title"
    >
        <h1 id="pause-title">Paused</h1>
        <p class="hint">Press Escape or click outside to resume.</p>
        <button id="resume-btn" type="button">Resume</button>
        <button id="restart-btn" type="button">Restart Game</button>
    </div>

    <div id="game-wrapper">
        <main class="hidden" id="game-main">
            <div id="hud" aria-label="Player status">
                <span class="hud-stat"><span class="stat-label">Level</span> <span class="stat-value" id="level">1</span></span>
                <span class="hud-stat"><span class="stat-label">Health</span> <span class="stat-value" id="health">10 / 10</span></span>
                <span class="hud-stat"><span class="stat-label">Objective</span> <span class="stat-value" id="objective">Pipe</span></span>
                <span class="hud-stat"><span class="stat-label">Exit</span> <span class="stat-value" id="exit-status">Locked 0 / 4</span></span>
                <span class="hud-stat"><span class="stat-label">Money</span> <span class="stat-value" id="money">$40</span></span>
                <span class="hud-stat"><span class="stat-label">Weapon</span> <span class="stat-value" id="weapon">Improvised 1</span></span>
                <span class="hud-stat"><span class="stat-label">Mining</span> <span class="stat-value" id="mining">0 (0)</span></span>
                <span class="hud-stat"><span class="stat-label">Pack</span> <span class="stat-value" id="backpack">1 / 8</span></span>
                <span class="hud-stat"><span class="stat-label">Next foe</span> <span class="stat-value" id="reinforcement">30–60s</span></span>
                <span class="hud-stat"><span class="stat-label">Status</span> <span class="stat-value" id="player-status">Clear</span></span>
                <button
                    id="menu-toggle-btn"
                    class="hidden"
                    type="button"
                    aria-label="Open menu"
                    aria-controls="pause-panel"
                    aria-expanded="false"
                >☰</button>
            </div>
            <div id="canvas-stage">
                <canvas
                    id="canvas"
                    aria-label="Maze game. Use arrow keys or WASD to move."
                ></canvas>
            </div>
            <p id="message" role="status" aria-live="polite" aria-atomic="true"></p>
        </main>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
